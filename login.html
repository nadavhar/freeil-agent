<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה — FreeIL</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="robots" content="noindex">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 260px;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            z-index: 0;
            pointer-events: none;
        }
        .page {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 3rem;
        }

        /* Logo */
        .logo-area { text-align: center; margin-bottom: 1.75rem; }
        .logo { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-mark {
            width: 46px; height: 46px;
            background: rgba(0,212,170,0.15);
            border: 1.5px solid rgba(0,212,170,0.35);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-mark svg { color: #00d4aa; }
        .logo-text { font-size: 1.9rem; font-weight: 800; color: white; letter-spacing: -0.03em; line-height: 1; }
        .logo-text span { color: #00d4aa; }
        .logo-tagline { margin-top: 0.75rem; color: rgba(255,255,255,0.55); font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }

        /* Card */
        .card { width: 100%; max-width: 420px; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06); overflow: hidden; }
        .card-body { padding: 2rem 1.75rem 1.75rem; }
        .card-header { text-align: center; margin-bottom: 1.75rem; }
        .card-title { font-size: 1.25rem; font-weight: 800; color: #0f172a; margin-bottom: 0.35rem; }
        .card-subtitle { font-size: 0.82rem; color: #64748b; line-height: 1.5; }

        /* Social buttons */
        .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
        .social-btn {
            width: 100%; height: 52px;
            border-radius: 14px;
            border: 1.5px solid #e2e8f0;
            background: white;
            display: flex; align-items: center; justify-content: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e293b;
        }
        .social-btn:hover { background: #f8fafc; border-color: #cbd5e1; box-shadow: 0 2px 8px rgba(0,0,0,0.07); transform: translateY(-1px); }
        .social-btn:active { transform: translateY(0); box-shadow: none; }
        .social-btn.apple { background: #0f172a; border-color: #0f172a; color: white; }
        .social-btn.apple:hover { background: #1e293b; border-color: #1e293b; }
        .social-btn svg { flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Divider */
        .divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; color: #94a3b8; font-size: 0.78rem; font-weight: 500; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

        /* Form */
        .form { display: flex; flex-direction: column; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.8rem; font-weight: 600; color: #374151; display: flex; justify-content: space-between; align-items: center; }
        .forgot-link { font-size: 0.75rem; font-weight: 500; color: #00d4aa; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }

        .input-wrapper { position: relative; }
        .input-icon { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; display: flex; align-items: center; }

        input[type="email"], input[type="password"] {
            width: 100%; height: 48px;
            padding: 0 42px 0 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
            font-size: 15px;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        @media (min-width: 480px) { input[type="email"], input[type="password"] { font-size: 0.9rem; } }
        input:focus { border-color: #00d4aa; background: #fff; box-shadow: 0 0 0 3px rgba(0,212,170,0.12); }
        input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
        input::placeholder { color: #94a3b8; }

        .password-wrapper input { padding-left: 42px; }
        .toggle-pw {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #94a3b8;
            padding: 4px; display: flex; align-items: center; transition: color 0.2s; border-radius: 6px;
        }
        .toggle-pw:hover { color: #475569; }

        .field-error { font-size: 0.72rem; color: #ef4444; font-weight: 500; min-height: 16px; display: flex; align-items: center; gap: 4px; }
        .field-error:empty { display: none; }

        /* Submit */
        .submit-btn {
            width: 100%; height: 52px;
            background: #00d4aa; color: #0f172a;
            border: none; border-radius: 14px;
            font-size: 0.95rem; font-weight: 800;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 4px;
            box-shadow: 0 4px 16px rgba(0,212,170,0.3);
        }
        .submit-btn:hover:not(:disabled) { background: #00bfa0; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,170,0.4); }
        .submit-btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }
        .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(15,23,42,0.3); border-top-color: #0f172a; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .submit-btn.loading .btn-label { display: none; }
        .submit-btn.loading .spinner { display: block; }

        /* Card footer */
        .card-footer { padding: 1.1rem 1.75rem; background: #f8fafc; border-top: 1px solid #f1f5f9; text-align: center; }
        .card-footer p { font-size: 0.82rem; color: #64748b; }
        .card-footer a { color: #00d4aa; font-weight: 700; text-decoration: none; }
        .card-footer a:hover { text-decoration: underline; }

        /* Toast */
        .toast {
            position: fixed; bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b; color: white;
            padding: 12px 20px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 500;
            z-index: 999; opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            white-space: nowrap; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25); pointer-events: none;
        }
        .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: #dc2626; }
        .toast.success { background: #059669; }
    </style>
</head>
<body>
<div class="page">

    <!-- Back to home -->
    <a href="/" style="display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,0.6); font-size:0.8rem; font-weight:500; text-decoration:none; margin-bottom:1.25rem; transition:color 0.2s;" onmouseover="this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        לדף הבית
    </a>

    <!-- Logo -->
    <div class="logo-area">
        <a href="/" class="logo">
            <div class="logo-mark">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/>
                    <line x1="9" y1="9" x2="9" y2="15" stroke-dasharray="2 2"/>
                </svg>
            </div>
            <span class="logo-text">Free<span>IL</span></span>
        </a>
        <div class="logo-tagline">אירועים חינם בישראל</div>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-body">
            <div class="card-header">
                <h1 class="card-title">ברוכים השבים 👋</h1>
                <p class="card-subtitle">התחברו כדי לנהל ולהוסיף אירועים חינמיים</p>
            </div>

            <!-- Social login -->
            <div class="social-btns">
                <a class="social-btn google" id="btn-google" href="https://iymmfwjsmaziymmwijjn.supabase.co/auth/v1/authorize?provider=google&redirect_to=https://freeil.vercel.app/">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    המשך עם Google
                </a>
                <button class="social-btn apple" id="btn-apple" onclick="handleSocialLogin('apple')" type="button">
                    <svg width="19" height="19" viewBox="0 0 814 1000" fill="white">
                        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105.4-57-155.3-127.4C46 399.4 0 280.5 0 166.7C0 64 46 14 71.2 14c23.4 0 41.4 5.3 56.8 5.3 13.4 0 35.3-5.3 56.8-5.3 96.4 0 152.3 96.4 152.3 96.4s49.7 12.1 49.7-44.3c0-49.3-30.1-96.4-30.1-96.4S406 0 406 97.6c0 36.1-8.5 71.9-22.2 105.1 35.1-2.3 72.3-5.8 91.8-5.8 118.7 0 191.3 68.8 191.3 191.3 0 121.6-68.8 189.1-140.1 189.1-26.2 0-51.6-15.7-77.2-15.7-25.5 0-50.8 18.9-77.3 18.9-26.4 0-50.8-20.5-77.3-20.5-26.4 0-54.1 22.1-80.6 22.1C117.1 582 68.3 490.6 68.3 400c0-87.5 43.5-184 111.3-184 56.3 0 103.7 24.8 134 45.7l12.9-28.1c-29.7-62.9-91.5-105.1-160.4-105.1-56.3 0-101 22.7-128.8 22.7-27.9 0-61.3-22.7-61.3-22.7C-16.5 177 0 280.5 0 280.5z"/>
                    </svg>
                    המשך עם Apple
                </button>
            </div>

            <div class="divider">או</div>

            <!-- Email login form -->
            <form class="form" id="login-form" novalidate onsubmit="handleSubmit(event)">

                <div class="field">
                    <label for="email">דואר אלקטרוני</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        </span>
                        <input type="email" id="email" placeholder="you@example.com"
                               autocomplete="email" inputmode="email" dir="ltr"
                               oninput="clearError('email')">
                    </div>
                    <span class="field-error" id="email-error"></span>
                </div>

                <div class="field">
                    <label for="password">
                        סיסמה
                        <a href="#" class="forgot-link" onclick="showToast('שחזור סיסמה יהיה זמין בקרוב', '');return false">שכחתי סיסמה</a>
                    </label>
                    <div class="input-wrapper password-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </span>
                        <input type="password" id="password" placeholder="הסיסמה שלך"
                               autocomplete="current-password" dir="ltr"
                               oninput="clearError('password')">
                        <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="הצג/הסתר סיסמה">
                            <svg id="eye-show" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg id="eye-hide" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <span class="field-error" id="password-error"></span>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <div class="spinner"></div>
                    <span class="btn-label">כניסה לחשבון</span>
                </button>
            </form>
        </div>

        <div class="card-footer">
            <p>אין לך חשבון עדיין? <a href="/register.html">הרשמה חינם</a></p>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    const { createClient } = window.supabase;
    const supabase = createClient(
        'https://iymmfwjsmaziymmwijjn.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5bW1md2pzbWF6aXltbXdpampuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDA4NjEsImV4cCI6MjA4ODI3Njg2MX0.caAHy7Ie28m17akWRL98Zisoi91FJLtKkpwStmLjSh0'
    );

    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) window.location.href = '/';
    });

    let pwVisible = false;
    function togglePassword() {
        pwVisible = !pwVisible;
        document.getElementById('password').type = pwVisible ? 'text' : 'password';
        document.getElementById('eye-show').style.display = pwVisible ? 'none'  : 'block';
        document.getElementById('eye-hide').style.display = pwVisible ? 'block' : 'none';
    }

    function clearError(field) {
        document.getElementById(field).classList.remove('error');
        document.getElementById(field + '-error').innerHTML = '';
    }

    function setError(field, msg) {
        document.getElementById(field).classList.add('error');
        document.getElementById(field + '-error').innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            ${msg}`;
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email)    { setError('email',    'נא להזין כתובת דואר אלקטרוני'); return; }
        if (!password) { setError('password', 'נא להזין סיסמה'); return; }

        setLoading(true);

        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            setLoading(false);
            showToast(mapError(error.message), 'error');
            return;
        }

        window.location.href = '/';
    }

    async function handleSocialLogin(provider) {
        const btn = document.getElementById('btn-' + provider);
        const originalHtml = btn.innerHTML;

        // Show loading state on button
        btn.disabled = true;
        btn.style.opacity = '0.7';
        btn.innerHTML = `<svg style="animation:spin 0.7s linear infinite" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> מתחבר…`;

        const { data, error } = await supabase.auth.signInWithOAuth({
            provider,
            options: { redirectTo: window.location.origin + '/' },
        });

        if (error) {
            btn.disabled = false;
            btn.style.opacity = '';
            btn.innerHTML = originalHtml;

            // Provider not enabled in Supabase dashboard
            if (/provider is not enabled/i.test(error.message)) {
                showToast('Google login לא מוגדר עדיין — יש להפעיל בדשבורד Supabase', 'error');
            } else {
                showToast(mapError(error.message), 'error');
            }
            return;
        }

        // signInWithOAuth redirects the browser — no further code runs
    }

    function mapError(msg) {
        if (/invalid login|Invalid login/i.test(msg))     return 'האימייל או הסיסמה שגויים';
        if (/Email not confirmed/i.test(msg))              return 'יש לאשר את האימייל תחילה — בדוק/י את תיבת הדואר';
        if (/too many requests/i.test(msg))                return 'יותר מדי ניסיונות — נסה/י שוב עוד כמה דקות';
        if (/network|fetch/i.test(msg))                    return 'שגיאת רשת — בדוק/י את החיבור לאינטרנט';
        return msg;
    }

    function setLoading(on) {
        const btn = document.getElementById('submit-btn');
        btn.classList.toggle('loading', on);
        btn.disabled = on;
    }

    let toastTimer;
    function showToast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast ${type} visible`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('visible'), 3500);
    }
</script>
</body>
</html>
